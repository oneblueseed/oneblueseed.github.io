<div class="post-gallery">
    {% assign images = include.urls | split: "," %}
    {% for img in images %}
        <img src="{{ img | strip | relative_url }}" alt="Gallery Image Component">
    {% endfor %}
</div>

<style>
    .post-gallery { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
        gap: 15px; 
        margin: 30px 0; 
    }
    .post-gallery img { 
        width: 100%; 
        height: 200px; 
        object-fit: cover; 
        border-radius: 4px; 
        transition: transform 0.2s ease;
    }
    .post-gallery img:hover { transform: scale(1.02); }
</style>
