---

<div class="blog-container">
    {% for post in site.posts %}
        <article class="blog-card">
            <!-- Check if the post has a thumbnail image -->
            {% if post.thumbnail %}
                <div class="blog-card-image">
                    <a href="{{ post.url | relative_url }}">
                        <img src="{{ post.thumbnail | relative_url }}" alt="{{ post.title }} Preview">
                    </a>
                </div>
            {% endif %}
            
            <div class="blog-card-content">
                <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
                <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
                <p>{{ post.description }}</p>
                <a href="{{ post.url | relative_url }}" class="read-more">Read Article →</a>
            </div>
        </article>
    {% endfor %}
</div>


<style>
    .blog-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .blog-card { display: flex; gap: 20px; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 30px; }
    .blog-card-image { flex: 1; max-width: 250px; }
    .blog-card-image img { width: 100%; height: 160px; object-fit: cover; border-radius: 4px; }
    .blog-card-content { flex: 2; }
    .blog-card-content h2 { margin: 5px 0 10px 0; font-weight: 400; }
    .blog-card-content h2 a { color: #222; text-decoration: none; }
    .post-date { color: #999; font-size: 0.8rem; }
    .read-more { display: inline-block; margin-top: 10px; color: #000; font-weight: 500; font-size: 0.9rem; }

    .rss-button {
        display: inline-block;
        padding: 8px 16px;
        font-size: 0.85rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #e66000; /* Classic RSS Orange tone */
        border: 1px solid #e66000;
        border-radius: 4px;
        text-decoration: none;
        transition: all 0.2s ease;
    }
    .rss-button:hover {
        background-color: #e66000;
        color: #fff;
    }
</style>
